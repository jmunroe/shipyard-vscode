<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Shipyard blue rounded-square tile -->
  <rect width="128" height="128" rx="28" fill="#0E639C"/>
  <!-- white gantry crane, same mark as the sidebar icon, scaled 4x and centered -->
  <g transform="translate(16 16) scale(4)" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- jib (horizontal boom) -->
    <path d="M3 6 H20"/>
    <!-- tower apex + stay cables to each jib tip -->
    <path d="M6.7 6 L8.5 3.2 L10.3 6"/>
    <path d="M8.5 3.2 L19.4 5.8 M8.5 3.2 L3.4 5.8"/>
    <!-- mast -->
    <path d="M8.5 6 V18"/>
    <!-- tower base legs -->
    <path d="M8.5 18 L5.6 21.4 M8.5 18 L11.4 21.4"/>
    <!-- counterweight on the short arm -->
    <rect x="3" y="6" width="2.3" height="2.4" rx="0.3"/>
    <!-- hoist cable from trolley down to the load -->
    <path d="M17 6 V10.4"/>
    <!-- container being lifted -->
    <rect x="14.8" y="10.4" width="4.4" height="3.2" rx="0.3"/>
  </g>
</svg>
